<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Mongolian News Portal</title>
  <desc id="desc">Preview cover for a Mongolian news portal homepage.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111214" />
      <stop offset="55%" stop-color="#293447" />
      <stop offset="100%" stop-color="#cb1f25" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" rx="36" fill="url(#bg)" />
  <circle cx="950" cy="120" r="130" fill="rgba(255,255,255,0.08)" />
  <circle cx="1020" cy="520" r="180" fill="rgba(255,255,255,0.06)" />
  <rect x="80" y="90" width="160" height="18" rx="9" fill="#ffb7b9" />
  <text x="80" y="190" fill="#ffffff" font-family="Arial, sans-serif" font-size="68" font-weight="700">
    Mongolian News Portal
  </text>
  <text x="80" y="255" fill="#f6e4e4" font-family="Arial, sans-serif" font-size="30">
    Politics, society, video news and local updates
  </text>
  <rect x="80" y="330" width="320" height="140" rx="24" fill="rgba(255,255,255,0.10)" />
  <rect x="440" y="330" width="320" height="140" rx="24" fill="rgba(255,255,255,0.08)" />
  <rect x="800" y="330" width="320" height="140" rx="24" fill="rgba(255,255,255,0.12)" />
  <text x="110" y="390" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="700">
    Featured story
  </text>
  <text x="470" y="390" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="700">
    Video coverage
  </text>
  <text x="830" y="390" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="700">
    Local updates
  </text>
</svg>
